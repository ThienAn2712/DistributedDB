services:
  mongodb:
    image: mongo:7
    container_name: bookstore_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
      MONGO_INITDB_DATABASE: bookstore
    volumes:
      - mongo_data:/data/db
    networks:
      - bookstore_net

  mongo-express:
    image: mongo-express:latest
    container_name: bookstore_mongoui
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongodb
    networks:
      - bookstore_net

  airflow:
    image: apache/airflow:2.8.1
    container_name: bookstore_airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      MONGO_CONN: mongodb://admin:admin@mongodb:27017/

      ORACLE_HOST: 26.30.167.151
      ORACLE_PORT: 1521
      ORACLE_SID: orcl
      ORACLE_USER: giamdoc_cn2
      ORACLE_PASSWORD: giamdoc_cn2

      _PIP_ADDITIONAL_REQUIREMENTS: "pymongo==4.10.1 oracledb==2.3.0"
    volumes:
      - ./dags:/opt/airflow/dags
    depends_on:
      - mongodb
    networks:
      - bookstore_net
    command: >
      bash -c "
      airflow db init;
      airflow users create
      --username admin
      --password admin
      --firstname A
      --lastname B
      --role Admin
      --email a@b.com || true;
      airflow scheduler &
      exec airflow webserver
      "

volumes:
  mongo_data:

networks:
  bookstore_net:
    driver: bridge